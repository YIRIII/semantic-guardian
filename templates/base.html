<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}الحارس الدلالي{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">الحارس الدلالي</a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if active == 'dashboard' %}active{% endif %}">لوحة التحكم</a>
                <a href="/records" class="nav-link {% if active == 'records' %}active{% endif %}">السجلات</a>
                <a href="/upload" class="nav-link {% if active == 'upload' %}active{% endif %}">رفع ملف</a>
                <a href="/records/add" class="nav-link {% if active == 'add' %}active{% endif %}">إضافة سجل</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/charts.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
