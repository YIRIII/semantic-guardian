<div class="table-container">
    <table class="data-table">
        <thead>
            <tr>
                <th>رقم السجل</th>
                <th>المسمى الوظيفي</th>
                <th>درجة الثقة</th>
                <th>الحالة</th>
                <th>تفاصيل</th>
            </tr>
        </thead>
        <tbody>
            {% for rec in records %}
            <tr>
                <td>{{ rec.record_id }}</td>
                <td>{{ rec.job_title }}</td>
                <td>
                    <span class="trust-badge {% if rec.trust_score >= 0.7 %}trust-high{% elif rec.trust_score >= 0.4 %}trust-medium{% else %}trust-low{% endif %}">
                        {{ "%.2f"|format(rec.trust_score) }}
                    </span>
                </td>
                <td>
                    {% if rec.is_valid %}
                    <span class="badge badge-valid">صالح</span>
                    {% else %}
                    <span class="badge badge-invalid">غير صالح</span>
                    {% endif %}
                </td>
                <td><a href="/records/{{ rec.id }}" class="btn btn-sm">عرض</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
