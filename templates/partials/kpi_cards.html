<div class="kpi-grid">
    <div class="kpi-card">
        <div class="kpi-label">إجمالي السجلات</div>
        <div class="kpi-value">{{ kpis.total }}</div>
    </div>
    <div class="kpi-card kpi-valid">
        <div class="kpi-label">صالح</div>
        <div class="kpi-value">{{ kpis.valid }}</div>
    </div>
    <div class="kpi-card kpi-invalid">
        <div class="kpi-label">غير صالح</div>
        <div class="kpi-value">{{ kpis.invalid }}</div>
    </div>
    <div class="kpi-card kpi-trust">
        <div class="kpi-label">متوسط الثقة</div>
        <div class="kpi-value">{{ kpis.avg_trust }}</div>
    </div>
</div>
